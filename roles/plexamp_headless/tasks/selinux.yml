---
# Ansible's file/copy/unarchive modules apply correct SELinux context
# automatically when python3-libselinux is present (installed in
# install.yml). This is a safety net for the rsync step in download.yml,
# which happens outside Ansible's own file modules and so isn't
# auto-relabeled.
- name: Restore SELinux context on install directory
  ansible.builtin.command: restorecon -Rv {{ plexamp_home }}
  register: plexamp_restorecon
  changed_when: "'Relabeled' in plexamp_restorecon.stdout"
  when: ansible_facts.selinux.status | default('') == 'enabled'

# Port 32500 is unprivileged (>1024) and not a distinct SELinux port type
# under the targeted policy, so a custom semanage port rule normally isn't
# required. If the service fails to bind or start under enforcing mode,
# check for denials with:
#   sudo ausearch -m avc -ts recent
